<header class="site-header">

    <nav class="site-nav" aria-label="主要導覽">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} aria-current="page"{% endif %}>Today</a>

      <a href="{{ '/about.html' | relative_url }}"{% if page.url contains 'about' %} aria-current="page"{% endif %}>About</a>
    </nav>
  </div>
</header>
